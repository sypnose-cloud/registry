<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Registry Universal — Sypnose</title>
<style>
  /* ====================================================================
     Registry Universal Dashboard — dark devops theme, vanilla, no deps.
     Consume /registry/* (rutas relativas). 1 solo archivo, todo inline.
     ==================================================================== */
  :root {
    --bg:        #0c0f14;
    --bg-2:      #11151c;
    --panel:     #161b24;
    --panel-2:   #1c2230;
    --border:    #232b38;
    --border-2:  #2d3b4d;
    --text:      #d7dde7;
    --text-dim:  #8a95a6;
    --text-faint:#5b6577;
    --accent:    #4da3ff;
    --accent-2:  #2563eb;
    --ok:        #36d399;
    --warn:      #fbbf24;
    --err:       #f87171;
    --shadow:    0 1px 3px rgba(0,0,0,.45), 0 8px 24px rgba(0,0,0,.25);
    --radius:    10px;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", "Cascadia Code", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;

    /* colores por tipo de proyecto */
    --t-saas:    #a855f7;
    --t-api:     #4da3ff;
    --t-bot:     #f59e0b;
    --t-worker:  #14b8a6;
    --t-scraper: #ec4899;
    --t-web:     #34d399;
    --t-library: #94a3b8;
    --t-unknown: #64748b;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: radial-gradient(1200px 600px at 80% -10%, #131a26 0%, var(--bg) 55%) fixed;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    padding: 0 0 64px;
  }
  a { color: var(--accent); text-decoration: none; }

  .wrap { max-width: 1240px; margin: 0 auto; padding: 0 20px; }

  /* ---------------- header ---------------- */
  header {
    position: sticky; top: 0; z-index: 50;
    backdrop-filter: blur(10px);
    background: rgba(12,15,20,.82);
    border-bottom: 1px solid var(--border);
  }
  .head-row {
    display: flex; align-items: center; gap: 18px;
    padding: 14px 0; flex-wrap: wrap;
  }
  .brand { display: flex; align-items: center; gap: 11px; min-width: 0; }
  .logo {
    width: 34px; height: 34px; border-radius: 9px; flex: 0 0 auto;
    background: linear-gradient(135deg, var(--accent) 0%, var(--t-saas) 100%);
    display: grid; place-items: center; font-weight: 800; color: #061018;
    box-shadow: var(--shadow); font-size: 17px;
  }
  .brand h1 { font-size: 16px; margin: 0; font-weight: 700; letter-spacing: .2px; }
  .brand .sub { font-size: 11.5px; color: var(--text-faint); }

  .head-stats { display: flex; gap: 22px; margin-left: auto; flex-wrap: wrap; }
  .hstat { text-align: right; }
  .hstat .v { font-size: 17px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .hstat .l { font-size: 10.5px; color: var(--text-faint); text-transform: uppercase; letter-spacing: .6px; }
  .hstat .v.mono { font-family: var(--mono); font-size: 14px; }

  .refresh-pill {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: 11.5px; color: var(--text-dim);
    border: 1px solid var(--border); border-radius: 999px;
    padding: 5px 11px; background: var(--panel);
    cursor: pointer; user-select: none; transition: border-color .15s;
  }
  .refresh-pill:hover { border-color: var(--accent); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ok); box-shadow: 0 0 8px var(--ok); }
  .dot.stale { background: var(--warn); box-shadow: 0 0 8px var(--warn); }
  .dot.dead  { background: var(--err);  box-shadow: 0 0 8px var(--err); }
  .spin { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---------------- type cards ---------------- */
  .section { margin-top: 30px; }
  .section > h2 {
    font-size: 12.5px; text-transform: uppercase; letter-spacing: 1.1px;
    color: var(--text-dim); margin: 0 0 13px; font-weight: 700;
    display: flex; align-items: center; gap: 9px;
  }
  .section > h2 .count {
    font-family: var(--mono); font-size: 11px; color: var(--text-faint);
    background: var(--panel); border: 1px solid var(--border);
    padding: 1px 8px; border-radius: 999px; font-weight: 600;
  }

  .type-grid {
    display: grid; gap: 12px;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  }
  .type-card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 15px 16px; position: relative;
    overflow: hidden; box-shadow: var(--shadow);
  }
  .type-card::before {
    content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
    background: var(--tc, var(--accent));
  }
  .type-card .num { font-size: 30px; font-weight: 800; line-height: 1; font-variant-numeric: tabular-nums; }
  .type-card .lbl {
    margin-top: 7px; font-size: 12px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: .7px; display: flex; align-items: center; gap: 7px;
  }
  .type-card .lbl::before {
    content: ""; width: 8px; height: 8px; border-radius: 2px; background: var(--tc, var(--accent));
  }

  /* ---------------- panels & tables ---------------- */
  .panel {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden;
  }
  .panel + .panel { margin-top: 14px; }
  .panel-head {
    display: flex; align-items: center; gap: 10px;
    padding: 13px 16px; border-bottom: 1px solid var(--border); background: var(--bg-2);
  }
  .panel-head h3 { margin: 0; font-size: 13.5px; font-weight: 700; }
  .panel-head .meta { margin-left: auto; font-size: 11.5px; color: var(--text-faint); font-family: var(--mono); }
  .panel-body { padding: 4px 0; }

  .grid-2 { display: grid; gap: 14px; grid-template-columns: 1fr 1fr; }
  @media (max-width: 860px) { .grid-2 { grid-template-columns: 1fr; } }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    text-align: left; font-size: 10.5px; text-transform: uppercase; letter-spacing: .7px;
    color: var(--text-faint); font-weight: 700; padding: 9px 16px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--bg-2);
  }
  td { padding: 9px 16px; border-bottom: 1px solid rgba(35,43,56,.5); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tbody tr { transition: background .12s; }
  tbody tr:hover { background: var(--panel-2); }
  .mono { font-family: var(--mono); }
  .scroll-y { max-height: 360px; overflow-y: auto; }
  .scroll-y::-webkit-scrollbar { width: 9px; }
  .scroll-y::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }

  /* status pills */
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: 999px;
    border: 1px solid var(--border); background: var(--panel-2); white-space: nowrap;
  }
  .pill .d { width: 7px; height: 7px; border-radius: 50%; background: var(--text-faint); }
  .pill.s-ok    { color: var(--ok);   border-color: rgba(54,211,153,.35);  background: rgba(54,211,153,.08); }
  .pill.s-ok .d { background: var(--ok); }
  .pill.s-warn    { color: var(--warn); border-color: rgba(251,191,36,.35);  background: rgba(251,191,36,.08); }
  .pill.s-warn .d { background: var(--warn); }
  .pill.s-err    { color: var(--err);  border-color: rgba(248,113,113,.35); background: rgba(248,113,113,.08); }
  .pill.s-err .d { background: var(--err); }

  /* type badge */
  .badge {
    display: inline-block; font-size: 10.5px; font-weight: 700; letter-spacing: .5px;
    text-transform: uppercase; padding: 2px 8px; border-radius: 6px;
    color: #08101c; background: var(--tc, var(--accent));
  }

  /* ---------------- projects list ---------------- */
  .proj { border-bottom: 1px solid rgba(35,43,56,.5); }
  .proj:last-child { border-bottom: none; }
  .proj-row {
    display: grid; grid-template-columns: 20px 1.6fr 92px 1fr auto;
    gap: 12px; align-items: center; padding: 11px 16px; cursor: pointer; transition: background .12s;
  }
  .proj-row:hover { background: var(--panel-2); }
  .proj-row .caret { color: var(--text-faint); transition: transform .18s; font-size: 12px; }
  .proj.open .proj-row .caret { transform: rotate(90deg); color: var(--accent); }
  .proj-name { font-weight: 600; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .proj-fw { color: var(--text-dim); font-size: 12.5px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .proj-ep { font-family: var(--mono); font-size: 12px; color: var(--text-dim); text-align: right; white-space: nowrap; }
  .proj-ep b { color: var(--text); }
  @media (max-width: 720px) {
    .proj-row { grid-template-columns: 18px 1fr auto; }
    .proj-fw, .proj-ep { display: none; }
  }
  .proj-detail {
    display: none; padding: 4px 16px 18px 48px;
    background: var(--bg-2); border-top: 1px dashed var(--border);
  }
  .proj.open .proj-detail { display: block; }
  .kv { display: grid; grid-template-columns: 130px 1fr; gap: 4px 14px; font-size: 12.5px; margin-top: 12px; }
  .kv dt { color: var(--text-faint); }
  .kv dd { margin: 0; color: var(--text); }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    font-family: var(--mono); font-size: 11px; padding: 2px 8px; border-radius: 6px;
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text-dim);
  }

  /* ---------------- SaaS cards ---------------- */
  .saas-grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); }
  .saas-card {
    border: 1px solid var(--border); border-radius: var(--radius);
    background: linear-gradient(180deg, rgba(168,85,247,.06), transparent 120px), var(--panel);
    box-shadow: var(--shadow); overflow: hidden;
  }
  .saas-card .sc-head {
    padding: 15px 18px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 11px;
  }
  .saas-card .sc-head .ico {
    width: 32px; height: 32px; border-radius: 8px; flex: 0 0 auto;
    background: linear-gradient(135deg, var(--t-saas), var(--accent-2));
    display: grid; place-items: center; color: #08101c; font-weight: 800; font-size: 15px;
  }
  .saas-card .sc-name { font-size: 15px; font-weight: 700; }
  .saas-card .sc-sub  { font-size: 11.5px; color: var(--text-dim); }
  .saas-card .sc-body { padding: 14px 18px; }
  .saas-meta { display: flex; flex-wrap: wrap; gap: 8px 20px; font-size: 12.5px; margin-bottom: 12px; }
  .saas-meta .m b { color: var(--text-dim); font-weight: 600; }
  .ep-head { font-size: 10.5px; text-transform: uppercase; letter-spacing: .7px; color: var(--text-faint); margin: 6px 0 8px; }
  .ep-list { display: flex; flex-direction: column; gap: 4px; max-height: 180px; overflow-y: auto; }
  .ep {
    font-family: var(--mono); font-size: 12px; padding: 5px 9px; border-radius: 6px;
    background: var(--bg-2); border: 1px solid var(--border); color: var(--text);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .ep .verb { color: var(--accent); font-weight: 700; margin-right: 7px; }

  /* ---------------- states: loading / empty / error ---------------- */
  .state {
    padding: 26px 16px; text-align: center; color: var(--text-faint); font-size: 13px;
  }
  .state.err { color: var(--err); }
  .state .ico { font-size: 22px; display: block; margin-bottom: 6px; opacity: .8; }
  .skel {
    height: 14px; border-radius: 6px; margin: 10px 16px;
    background: linear-gradient(90deg, var(--panel-2) 25%, var(--border) 37%, var(--panel-2) 63%);
    background-size: 400% 100%; animation: shimmer 1.4s ease infinite;
  }
  @keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }

  .toast {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--panel); border: 1px solid var(--err); color: var(--err);
    padding: 9px 16px; border-radius: 10px; font-size: 12.5px; box-shadow: var(--shadow);
    opacity: 0; pointer-events: none; transition: all .25s; z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  footer { margin-top: 36px; text-align: center; color: var(--text-faint); font-size: 11.5px; }
  footer .mono { color: var(--text-dim); }
</style>
</head>
<body>

<header>
  <div class="wrap head-row">
    <div class="brand">
      <div class="logo">R</div>
      <div>
        <h1>Registry Universal</h1>
        <div class="sub" id="hostline">cargando inventario…</div>
      </div>
    </div>
    <div class="head-stats">
      <div class="hstat"><div class="v" id="st-services">—</div><div class="l">Servicios</div></div>
      <div class="hstat"><div class="v" id="st-repos">—</div><div class="l">Repos</div></div>
      <div class="hstat"><div class="v mono" id="st-age">—</div><div class="l">Scan</div></div>
      <div class="hstat">
        <div class="refresh-pill" id="refreshBtn" title="Refrescar ahora">
          <span class="dot" id="liveDot"></span>
          <span id="refreshLbl">auto 30s</span>
        </div>
      </div>
    </div>
  </div>
</header>

<main class="wrap">

  <!-- TYPE CARDS -->
  <section class="section" id="sec-types">
    <h2>Inventario por tipo <span class="count" id="types-total"></span></h2>
    <div class="type-grid" id="typeGrid">
      <div class="type-card"><div class="skel" style="margin:0;width:50%"></div><div class="skel" style="margin:14px 0 0;width:70%"></div></div>
      <div class="type-card"><div class="skel" style="margin:0;width:50%"></div><div class="skel" style="margin:14px 0 0;width:70%"></div></div>
      <div class="type-card"><div class="skel" style="margin:0;width:50%"></div><div class="skel" style="margin:14px 0 0;width:70%"></div></div>
    </div>
  </section>

  <!-- SAAS (destacado) -->
  <section class="section" id="sec-saas">
    <h2>SaaS <span class="count" id="saas-count"></span></h2>
    <div id="saasWrap">
      <div class="panel"><div class="skel"></div><div class="skel" style="width:60%"></div><div class="skel" style="width:80%"></div></div>
    </div>
  </section>

  <!-- SERVER -->
  <section class="section" id="sec-server">
    <h2>Servidor</h2>
    <div class="grid-2">
      <div class="panel">
        <div class="panel-head"><h3>Servicios</h3><span class="meta" id="srv-services-meta"></span></div>
        <div class="panel-body scroll-y" id="srvServices"><div class="skel"></div><div class="skel" style="width:70%"></div></div>
      </div>
      <div class="panel">
        <div class="panel-head"><h3>Puertos</h3><span class="meta" id="srv-ports-meta"></span></div>
        <div class="panel-body scroll-y" id="srvPorts"><div class="skel"></div><div class="skel" style="width:70%"></div></div>
      </div>
    </div>
    <div class="panel" style="margin-top:14px">
      <div class="panel-head"><h3>Contenedores</h3><span class="meta" id="srv-containers-meta"></span></div>
      <div class="panel-body scroll-y" id="srvContainers"><div class="skel"></div><div class="skel" style="width:70%"></div></div>
    </div>
  </section>

  <!-- PROJECTS -->
  <section class="section" id="sec-projects">
    <h2>Proyectos <span class="count" id="proj-count"></span></h2>
    <div class="panel">
      <div class="panel-head">
        <h3>Repos clasificados</h3>
        <span class="meta">click para expandir detalle</span>
      </div>
      <div class="panel-body" id="projList"><div class="skel"></div><div class="skel" style="width:80%"></div><div class="skel" style="width:65%"></div></div>
    </div>
  </section>

  <footer>
    Registry Universal — Sypnose · datos vía <span class="mono">/registry/*</span> · auto-refresh 30s
    <span id="lastUpdate"></span>
  </footer>
</main>

<div class="toast" id="toast"></div>

<script>
"use strict";
(function () {
  // ===================================================================
  //  Config & helpers
  // ===================================================================
  var REFRESH_MS = 30000;
  var refreshTimer = null;

  // colores por tipo (debe casar con las vars CSS --t-*)
  var TYPE_COLOR = {
    saas: "var(--t-saas)", api: "var(--t-api)", bot: "var(--t-bot)",
    worker: "var(--t-worker)", scraper: "var(--t-scraper)", web: "var(--t-web)",
    library: "var(--t-library)", unknown: "var(--t-unknown)"
  };
  // orden de aparicion de las tarjetas de tipo (las del enunciado primero)
  var TYPE_ORDER = ["saas", "api", "bot", "worker", "scraper", "web", "library", "unknown"];

  function $(id) { return document.getElementById(id); }

  // escape HTML — TODO valor que venga del backend pasa por aqui antes de innerHTML
  function esc(v) {
    if (v === null || v === undefined) return "";
    return String(v)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  }

  // primer valor no vacio entre varias claves candidatas de un objeto
  function pick(obj) {
    if (!obj) return undefined;
    for (var i = 1; i < arguments.length; i++) {
      var k = arguments[i];
      if (obj[k] !== undefined && obj[k] !== null && obj[k] !== "") return obj[k];
    }
    return undefined;
  }

  // normaliza cualquier shape a array
  function toArray(x) {
    if (Array.isArray(x)) return x;
    if (x && Array.isArray(x.projects)) return x.projects;
    if (x && Array.isArray(x.data)) return x.data;
    if (x && Array.isArray(x.items)) return x.items;
    return [];
  }

  // fetch JSON tolerante: nunca lanza, devuelve {ok, data, error, status}
  function getJSON(path) {
    return fetch(path, { headers: { "Accept": "application/json" }, cache: "no-store" })
      .then(function (r) {
        return r.text().then(function (t) {
          var data = null;
          try { data = t ? JSON.parse(t) : null; } catch (e) { data = null; }
          if (!r.ok) {
            var msg = (data && data.error) ? data.error : ("HTTP " + r.status);
            return { ok: false, error: msg, status: r.status, data: data };
          }
          return { ok: true, data: data, status: r.status };
        });
      })
      .catch(function (e) {
        return { ok: false, error: (e && e.message) || "network error", status: 0 };
      });
  }

  // edad legible: 42 -> "42s", 130 -> "2m", 7400 -> "2h" ...
  function humanAge(sec) {
    if (sec === null || sec === undefined || isNaN(sec)) return "—";
    sec = Math.max(0, Math.round(sec));
    if (sec < 60) return sec + "s";
    var m = Math.floor(sec / 60);
    if (m < 60) return m + "m";
    var h = Math.floor(m / 60);
    if (h < 24) return h + "h " + (m % 60) + "m";
    var d = Math.floor(h / 24);
    return d + "d " + (h % 24) + "h";
  }
  function ageDotClass(sec) {
    if (sec === null || sec === undefined || isNaN(sec)) return "dead";
    if (sec > 3600) return "stale";   // > 1h sin scan
    return "";
  }
  function fmtTimestamp(ts) {
    if (!ts) return null;
    var d = new Date(ts);
    if (isNaN(d.getTime())) return String(ts);
    return d.toLocaleString();
  }

  function stateHTML(kind, msg, icon) {
    var cls = kind === "err" ? "state err" : "state";
    return '<div class="' + cls + '"><span class="ico">' + (icon || "○") + "</span>" + esc(msg) + "</div>";
  }

  // clasifica un string de estado en ok / warn / err para la pill
  function statusClass(raw) {
    var s = String(raw || "").toLowerCase();
    if (/(^|\b)(running|active|up|online|healthy|ok|listen(ing)?|enabled)\b/.test(s)) return "s-ok";
    if (/(restart|starting|pending|warn|degraded|paused|created)/.test(s)) return "s-warn";
    if (/(dead|exit|failed|stopped|inactive|down|error|unhealthy|disabled)/.test(s)) return "s-err";
    return "";
  }

  var toastTimer = null;
  function toast(msg) {
    var el = $("toast"); el.textContent = msg; el.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { el.classList.remove("show"); }, 4000);
  }

  // ===================================================================
  //  Renderers
  // ===================================================================

  function renderSummary(res) {
    var hostEl = $("hostline");
    if (!res.ok || !res.data) {
      hostEl.textContent = res.error ? ("summary: " + res.error) : "sin datos de summary";
      $("st-services").textContent = "—";
      $("st-repos").textContent = "—";
      $("st-age").textContent = "—";
      $("liveDot").className = "dot dead";
      renderTypeCards(null);
      return;
    }
    var d = res.data;
    var host = pick(d, "hostname") || "host desconocido";
    var srcParts = [];
    if (d.sources) {
      if (d.sources.server_scan !== "ok") srcParts.push("server-scan: " + d.sources.server_scan);
      if (d.sources.projects !== "ok") srcParts.push("projects: " + d.sources.projects);
    }
    hostEl.innerHTML = '<span class="mono">' + esc(host) + "</span>" +
      (srcParts.length ? '  ·  <span style="color:var(--warn)">' + esc(srcParts.join(" / ")) + "</span>" : "");

    $("st-services").textContent = (d.n_services != null) ? d.n_services : "—";
    $("st-repos").textContent = (d.n_repos != null) ? d.n_repos : "—";

    var age = (typeof d.data_age_seconds === "number") ? d.data_age_seconds : null;
    $("st-age").textContent = "hace " + humanAge(age);
    $("liveDot").className = "dot " + ageDotClass(age);

    var scannedTxt = fmtTimestamp(pick(d, "scanned_at"));
    $("st-age").title = scannedTxt ? ("scan: " + scannedTxt) : "";

    renderTypeCards(d.by_type || {});
  }

  function renderTypeCards(byType) {
    var grid = $("typeGrid");
    var totalEl = $("types-total");
    if (!byType) {
      grid.innerHTML = stateHTML("err", "no data — summary no disponible", "⚠");
      totalEl.textContent = "";
      return;
    }
    // ordena: primero los del orden canonico presentes, luego extras alfabeticos
    var keys = Object.keys(byType);
    var ordered = TYPE_ORDER.filter(function (k) { return k in byType; });
    keys.forEach(function (k) { if (ordered.indexOf(k) === -1) ordered.push(k); });

    var total = 0;
    ordered.forEach(function (k) { total += (byType[k] || 0); });
    totalEl.textContent = total + " repos";

    if (!ordered.length) {
      grid.innerHTML = stateHTML("empty", "sin proyectos clasificados todavia", "○");
      return;
    }
    var html = ordered.map(function (k) {
      var color = TYPE_COLOR[k] || "var(--accent)";
      var n = byType[k] || 0;
      return '<div class="type-card" style="--tc:' + color + '">' +
               '<div class="num">' + esc(n) + "</div>" +
               '<div class="lbl">' + esc(k) + "</div>" +
             "</div>";
    }).join("");
    grid.innerHTML = html;
  }

  // ---- SERVER ----
  function renderServer(res) {
    var elServices = $("srvServices"), elPorts = $("srvPorts"), elContainers = $("srvContainers");
    if (!res.ok || !res.data) {
      var m = res.error || "no data";
      elServices.innerHTML = stateHTML("err", m, "⚠");
      elPorts.innerHTML = stateHTML("err", m, "⚠");
      elContainers.innerHTML = stateHTML("err", m, "⚠");
      $("srv-services-meta").textContent = "";
      $("srv-ports-meta").textContent = "";
      $("srv-containers-meta").textContent = "";
      return;
    }
    var d = res.data;
    var services = toArray(pick(d, "services", "processes")) ;
    var ports = toArray(pick(d, "ports", "listening", "open_ports"));
    var containers = toArray(pick(d, "containers", "docker"));

    // ---- services table (name, status) ----
    $("srv-services-meta").textContent = services.length + "";
    if (!services.length) {
      elServices.innerHTML = stateHTML("empty", "no data", "○");
    } else {
      var srows = services.map(function (s) {
        if (typeof s === "string") return rowName(s, "");
        var name = pick(s, "name", "unit", "service", "id", "cmd", "command") || "—";
        var status = pick(s, "status", "state", "active", "sub", "health") || "";
        return rowName(name, status);
      }).join("");
      elServices.innerHTML = tableWrap(["Servicio", "Estado"], srows);
    }

    // ---- ports table (port, process) ----
    $("srv-ports-meta").textContent = ports.length + "";
    if (!ports.length) {
      elPorts.innerHTML = stateHTML("empty", "no data", "○");
    } else {
      var prows = ports.map(function (p) {
        if (typeof p === "string" || typeof p === "number") {
          return "<tr><td class='mono'>" + esc(p) + "</td><td class='mono' style='color:var(--text-faint)'>—</td></tr>";
        }
        var port = pick(p, "port", "number", "listen", "local_port");
        var proto = pick(p, "proto", "protocol");
        var proc = pick(p, "process", "proc", "name", "program", "cmd", "service", "comm") || "—";
        var portTxt = (port != null ? port : "—") + (proto ? "/" + proto : "");
        return "<tr><td class='mono' style='color:var(--accent)'>" + esc(portTxt) + "</td>" +
               "<td class='mono'>" + esc(proc) + "</td></tr>";
      }).join("");
      elPorts.innerHTML = tableWrap(["Puerto", "Proceso"], prows);
    }

    // ---- containers table (name, image, status) ----
    $("srv-containers-meta").textContent = containers.length + "";
    if (!containers.length) {
      elContainers.innerHTML = stateHTML("empty", "no data — sin contenedores en el scan", "○");
    } else {
      var crows = containers.map(function (c) {
        if (typeof c === "string") return "<tr><td>" + esc(c) + "</td><td class='mono' style='color:var(--text-faint)'>—</td><td>—</td></tr>";
        var name = pick(c, "name", "names", "container", "id") || "—";
        var image = pick(c, "image", "img") || "—";
        var status = pick(c, "status", "state", "health") || "";
        var sc = statusClass(status);
        var pill = status ? '<span class="pill ' + sc + '"><span class="d"></span>' + esc(status) + "</span>"
                          : '<span style="color:var(--text-faint)">—</span>';
        return "<tr><td>" + esc(name) + "</td>" +
               "<td class='mono' style='color:var(--text-dim);font-size:11.5px'>" + esc(image) + "</td>" +
               "<td>" + pill + "</td></tr>";
      }).join("");
      elContainers.innerHTML = tableWrap(["Nombre", "Imagen", "Estado"], crows);
    }
  }

  function rowName(name, status) {
    var sc = statusClass(status);
    var pill = status ? '<span class="pill ' + sc + '"><span class="d"></span>' + esc(status) + "</span>"
                      : '<span style="color:var(--text-faint)">—</span>';
    return "<tr><td>" + esc(name) + "</td><td>" + pill + "</td></tr>";
  }
  function tableWrap(heads, rowsHTML) {
    var th = heads.map(function (h) { return "<th>" + esc(h) + "</th>"; }).join("");
    return "<table><thead><tr>" + th + "</tr></thead><tbody>" + rowsHTML + "</tbody></table>";
  }

  // ---- PROJECTS ----
  function renderProjects(res) {
    var el = $("projList"), countEl = $("proj-count");
    if (!res.ok) {
      el.innerHTML = stateHTML("err", res.error || "no data", "⚠");
      countEl.textContent = "";
      return;
    }
    var list = toArray(res.data);
    countEl.textContent = list.length + "";
    if (!list.length) {
      el.innerHTML = stateHTML("empty", "no data — ningun repo clasificado", "○");
      return;
    }
    // orden: saas primero, luego por endpoints desc, luego nombre
    list.sort(function (a, b) {
      var ta = (a.type === "saas") ? 0 : 1, tb = (b.type === "saas") ? 0 : 1;
      if (ta !== tb) return ta - tb;
      var ea = a.endpoints_approx || 0, eb = b.endpoints_approx || 0;
      if (eb !== ea) return eb - ea;
      return String(a.name || "").localeCompare(String(b.name || ""));
    });

    el.innerHTML = list.map(function (p, i) { return projectHTML(p, i); }).join("");

    // toggle handlers (delegacion simple por nodo)
    var nodes = el.querySelectorAll(".proj-row");
    for (var i = 0; i < nodes.length; i++) {
      nodes[i].addEventListener("click", function () {
        this.parentNode.classList.toggle("open");
      });
    }
  }

  function projectHTML(p, i) {
    var type = String(pick(p, "type") || "unknown").toLowerCase();
    var color = TYPE_COLOR[type] || "var(--accent)";
    var name = pick(p, "name") || "(sin nombre)";
    var fw = pick(p, "framework");
    var lang = pick(p, "language") || "unknown";
    var fwLang = (fw ? esc(fw) : "—") + (lang && lang !== "unknown" ? '  ·  <span style="color:var(--text-faint)">' + esc(lang) + "</span>" : "");
    var ep = (p.endpoints_approx != null) ? p.endpoints_approx : 0;
    var version = pick(p, "version");

    var stack = Array.isArray(p.stack) ? p.stack : [];
    var topDirs = Array.isArray(p.top_dirs) ? p.top_dirs : [];
    var markers = Array.isArray(p.markers_found) ? p.markers_found : [];
    var scripts = Array.isArray(p.scripts) ? p.scripts : [];

    var detail =
      '<div class="proj-detail">' +
        '<dl class="kv">' +
          kvRow("Tipo", '<span class="badge" style="--tc:' + color + '">' + esc(type) + "</span>") +
          kvRow("Lenguaje", esc(lang)) +
          (fw ? kvRow("Framework", esc(fw)) : "") +
          (version ? kvRow("Version", '<span class="mono">' + esc(version) + "</span>") : "") +
          kvRow("Endpoints aprox.", '<span class="mono">' + esc(ep) + "</span>") +
          (p.file_count != null ? kvRow("Ficheros", '<span class="mono">' + esc(p.file_count) + "</span>") : "") +
          (stack.length ? kvRow("Stack", chipList(stack)) : "") +
          (topDirs.length ? kvRow("Top dirs", chipList(topDirs)) : "") +
          (scripts.length ? kvRow("Scripts", chipList(scripts)) : "") +
          (markers.length ? kvRow("Señales", '<span style="color:var(--text-dim);font-size:11.5px">' + esc(markers.join(" · ")) + "</span>") : "") +
        "</dl>" +
      "</div>";

    return '<div class="proj" id="proj-' + i + '">' +
             '<div class="proj-row">' +
               '<span class="caret">▶</span>' +
               '<span class="proj-name" title="' + esc(name) + '">' + esc(name) + "</span>" +
               '<span><span class="badge" style="--tc:' + color + '">' + esc(type) + "</span></span>" +
               '<span class="proj-fw">' + fwLang + "</span>" +
               '<span class="proj-ep"><b>' + esc(ep) + "</b> ep</span>" +
             "</div>" +
             detail +
           "</div>";
  }
  function kvRow(k, vHTML) { return "<dt>" + esc(k) + "</dt><dd>" + vHTML + "</dd>"; }
  function chipList(arr) {
    return '<div class="chips">' + arr.map(function (x) {
      return '<span class="chip">' + esc(x) + "</span>";
    }).join("") + "</div>";
  }

  // ---- SAAS (destacado) ----
  function renderSaas(res) {
    var wrap = $("saasWrap"), countEl = $("saas-count");
    if (!res.ok) {
      wrap.innerHTML = '<div class="panel">' + stateHTML("err", res.error || "no data", "⚠") + "</div>";
      countEl.textContent = "";
      return;
    }
    var list = toArray(res.data);
    countEl.textContent = list.length + "";
    if (!list.length) {
      wrap.innerHTML = '<div class="panel">' + stateHTML("empty", "no data — ningun proyecto clasificado como SaaS", "○") + "</div>";
      return;
    }
    wrap.innerHTML = '<div class="saas-grid">' + list.map(saasCardHTML).join("") + "</div>";
  }

  function saasCardHTML(p) {
    var name = pick(p, "name") || "(sin nombre)";
    var fw = pick(p, "framework") || "—";
    var lang = pick(p, "language") || "unknown";
    var ep = (p.endpoints_approx != null) ? p.endpoints_approx : 0;
    var initial = String(name).replace(/[^A-Za-z0-9]/g, "").charAt(0).toUpperCase() || "S";

    // BD detectada: o un campo explicito, o derivada de los markers_found ("BD:...")
    var db = pick(p, "database", "db");
    if (!db && Array.isArray(p.markers_found)) {
      for (var i = 0; i < p.markers_found.length; i++) {
        var m = String(p.markers_found[i]);
        var hit = m.match(/^BD:(.+)$/i);
        if (hit) { db = hit[1]; break; }
      }
    }

    // endpoints/apis: si el scan trae lista de rutas la mostramos; si no, el conteo aprox
    var apis = pick(p, "apis", "endpoints", "routes");
    var apisArr = Array.isArray(apis) ? apis : [];

    var epBlock;
    if (apisArr.length) {
      epBlock =
        '<div class="ep-head">APIs / Endpoints (' + apisArr.length + ")</div>" +
        '<div class="ep-list">' + apisArr.map(function (e) {
          if (typeof e === "string") return '<div class="ep">' + esc(e) + "</div>";
          var verb = pick(e, "method", "verb");
          var path = pick(e, "path", "route", "url", "endpoint") || JSON.stringify(e);
          return '<div class="ep">' + (verb ? '<span class="verb">' + esc(verb) + "</span>" : "") + esc(path) + "</div>";
        }).join("") + "</div>";
    } else {
      epBlock = '<div class="ep-head">Endpoints</div>' +
        '<div class="ep" style="border-style:dashed;color:var(--text-dim)">' +
        esc(ep) + " endpoints aprox. (detalle no incluido en el scan)</div>";
    }

    return '<div class="saas-card">' +
             '<div class="sc-head">' +
               '<div class="ico">' + esc(initial) + "</div>" +
               "<div>" +
                 '<div class="sc-name">' + esc(name) + "</div>" +
                 '<div class="sc-sub">' + esc(fw) + "  ·  " + esc(lang) + "</div>" +
               "</div>" +
             "</div>" +
             '<div class="sc-body">' +
               '<div class="saas-meta">' +
                 '<span class="m"><b>Framework:</b> ' + esc(fw) + "</span>" +
                 '<span class="m"><b>Endpoints:</b> <span class="mono">' + esc(ep) + "</span></span>" +
                 (db ? '<span class="m"><b>BD:</b> <span class="mono" style="color:var(--t-saas)">' + esc(db) + "</span></span>"
                     : '<span class="m"><b>BD:</b> <span style="color:var(--text-faint)">no detectada</span></span>') +
               "</div>" +
               epBlock +
             "</div>" +
           "</div>";
  }

  // ===================================================================
  //  Load cycle
  // ===================================================================
  var loading = false;
  function loadAll(manual) {
    if (loading) return;
    loading = true;
    var btn = $("refreshBtn"), lbl = $("refreshLbl");
    btn.querySelector(".dot").classList.add("spin");
    if (manual) lbl.textContent = "refrescando…";

    var jobs = [
      getJSON("/registry/summary").then(renderSummary),
      getJSON("/registry/server").then(renderServer),
      getJSON("/registry/projects").then(renderProjects),
      getJSON("/registry/saas").then(renderSaas)
    ];

    Promise.all(jobs).then(function () {
      $("lastUpdate").textContent = " · últ. " + new Date().toLocaleTimeString();
    }).catch(function (e) {
      toast("Error al actualizar: " + ((e && e.message) || e));
    }).then(function () {
      loading = false;
      btn.querySelector(".dot").classList.remove("spin");
      lbl.textContent = "auto 30s";
    });
  }

  function schedule() {
    clearInterval(refreshTimer);
    refreshTimer = setInterval(function () {
      if (document.hidden) return;        // no machacar la API en pestañas ocultas
      loadAll(false);
    }, REFRESH_MS);
  }

  // refresco manual
  $("refreshBtn").addEventListener("click", function () { loadAll(true); });
  // al volver a la pestaña, refresca de inmediato
  document.addEventListener("visibilitychange", function () {
    if (!document.hidden) loadAll(false);
  });

  // arranque
  loadAll(true);
  schedule();
})();
</script>
</body>
</html>
